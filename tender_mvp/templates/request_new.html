{% extends "base.html" %}
{% block content %}
<div class="flex items-start justify-between gap-4">
  <div>
    <h1 class="text-2xl font-semibold tracking-tight">Новая заявка</h1>
    <p class="muted mt-1">FR-05</p>
  </div>
  <a href="/dashboard" class="px-4 py-2 rounded-xl border border-slate-200 hover:bg-slate-50">← Назад</a>
</div>

<div class="mt-4 p-6 rounded-2xl card bg-white">
  <form method="post" action="/requests/new" class="grid md:grid-cols-2 gap-4">
    <div>
      <label class="text-sm muted">Категория *</label>
      <select name="category_id" required class="mt-1 w-full px-3 py-2 rounded-xl border border-slate-200">
        {% for c in cats %}
          <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="text-sm muted">Валюта</label>
      <input name="currency" value="RUB" class="mt-1 w-full px-3 py-2 rounded-xl border border-slate-200" />
    </div>

    <div class="md:col-span-2">
      <label class="text-sm muted">Предмет закупки / Название *</label>
      <input name="subject" required class="mt-1 w-full px-3 py-2 rounded-xl border border-slate-200" />
    </div>

    <div class="md:col-span-2">
      <label class="text-sm muted">Описание / ТЗ</label>
      <textarea name="description" rows="4" class="mt-1 w-full px-3 py-2 rounded-xl border border-slate-200"></textarea>
    </div>

    <div>
      <label class="text-sm muted">Режим НДС</label>
      <select name="vat_mode" class="mt-1 w-full px-3 py-2 rounded-xl border border-slate-200">
        <option value="NDS_INCLUDED">NDS_INCLUDED</option>
        <option value="NDS_NOT_INCLUDED">NDS_NOT_INCLUDED</option>
      </select>
    </div>

    <div>
      <label class="text-sm muted">Условия оплаты</label>
      <input name="payment_terms" class="mt-1 w-full px-3 py-2 rounded-xl border border-slate-200" />
    </div>

    <div class="md:col-span-2">
      <label class="text-sm muted">Условия поставки</label>
      <input name="delivery_terms" class="mt-1 w-full px-3 py-2 rounded-xl border border-slate-200" />
    </div>

    <div class="md:col-span-2 flex justify-end">
      <button class="px-5 py-2.5 rounded-xl bg-blue-600 text-white hover:bg-blue-700">Создать заявку</button>
    </div>
  </form>
</div>
{% endblock %}
