<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title if title else "Tender MVP" }}</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* чуть-чуть "дорогого" вида */
    .glass { background: rgba(255,255,255,.75); backdrop-filter: blur(10px); }
    .card { border: 1px solid rgb(226 232 240); box-shadow: 0 10px 30px rgba(2,6,23,.06); }
    .badge { border: 1px solid rgb(226 232 240); }
    .muted { color: rgb(100 116 139); }
    .tab-active { border-bottom: 2px solid rgb(37 99 235); color: rgb(37 99 235); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-slate-100 text-slate-900">
  <header class="sticky top-0 z-30 border-b border-slate-200 bg-white/70 backdrop-blur">
    <div class="mx-auto max-w-7xl px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/dashboard" class="font-semibold tracking-tight text-slate-900">
          Tender MVP
        </a>
        <span class="text-xs px-2 py-1 rounded-full badge bg-slate-50 muted">v1.0</span>
      </div>

      <div class="flex items-center gap-3">
        {% if user and user.role == "ADMIN" %}
            <a href="/admin/users" class="text-sm px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50">Пользователи</a>
        {% endif %}
        {% if user %}
          <span class="text-sm muted">👤 {{ user.name or user.email }} ({{ user.role }})</span>
          <form method="post" action="/logout">
            <button class="text-sm px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50">Выйти</button>
          </form>
        {% endif %}
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="mx-auto max-w-7xl px-4 pb-8">
    <div class="text-xs muted">
      MVP: категории, поставщики, заявки, раунды, приглашения, КП по ссылке, PDF/XLSX, аудит.
    </div>
  </footer>
</body>
</html>
