{% extends "base.html" %}
{% block title %}Создать кабинет{% endblock %}
{% block content %}
<h1 class="h4 mb-3">Создать кабинет поставщика</h1>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <p class="text-muted">
      Для удобства участия в будущих тендерах задайте пароль для входа в кабинет.
      Email: <b>{{ supplier.user.email }}</b>
    </p>

    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Пароль</label>
          <input class="form-control" type="password" name="password1" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Повтор пароля</label>
          <input class="form-control" type="password" name="password2" required>
        </div>
      </div>

      <button class="btn btn-primary mt-3">Сохранить пароль</button>
      <a class="btn btn-outline-secondary mt-3" href="/login/">Войти</a>
    </form>
  </div>
</div>
{% endblock %}
