{% extends "base.html" %}
{% block title %}Регистрация поставщика{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-7">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Регистрация поставщика</h1>
        <form method="post">
          {% csrf_token %}
          {{ form.non_field_errors }}
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">{{ form.email.label }}</label>
              {{ form.email }}
            </div>
            <div class="col-md-6">
              <label class="form-label">{{ form.company_name.label }}</label>
              {{ form.company_name }}
            </div>
            <div class="col-md-6">
              <label class="form-label">{{ form.password1.label }}</label>
              {{ form.password1 }}
            </div>
            <div class="col-md-6">
              <label class="form-label">{{ form.password2.label }}</label>
              {{ form.password2 }}
            </div>
          </div>
          <div class="mt-3 d-flex gap-2">
            <button class="btn btn-primary">Создать аккаунт</button>
            <a class="btn btn-outline-secondary" href="/login/">Назад</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  // Bootstrap-классы на input (для красоты)
  document.querySelectorAll("input").forEach(i => i.classList.add("form-control"));
</script>
{% endblock %}
