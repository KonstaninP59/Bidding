<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RFQ система{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/app.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">RFQ</a>

    <div class="d-flex gap-2">
      {% if user.is_authenticated %}
        <span class="navbar-text text-white-50">
          {{ user.email }}
          {% if user.profile %} · {{ user.profile.get_role_display }}{% endif %}
        </span>
        <a class="btn btn-outline-light btn-sm" href="/logout/">Выйти</a>
      {% else %}
        <a class="btn btn-outline-light btn-sm" href="/login/">Войти</a>
      {% endif %}
    </div>
  </div>
</nav>

<main class="container my-4">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} mb-3">{{ message }}</div>
  {% endfor %}

  {% block content %}{% endblock %}
</main>

<footer class="container pb-4 text-center text-muted small">
  RFQ · MVP · интерфейс на русском языке
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
