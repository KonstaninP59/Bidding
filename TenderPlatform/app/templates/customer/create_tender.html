{% extends "base.html" %}
{% block content %}
<h2>Создание тендера</h2>
<form id="tenderForm">
    <div class="mb-3">
        <label class="form-label">Название</label>
        <input type="text" class="form-control" name="title" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Описание</label>
        <textarea class="form-control" name="description" rows="3"></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">Валюта</label>
        <input type="text" class="form-control" name="currency" value="RUB">
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" name="has_lots">
        <label class="form-check-label">Использовать лоты</label>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" name="is_vendor_rank_visible">
        <label class="form-check-label">Поставщик видит своё место</label>
    </div>

    <h4>Позиции</h4>
    <div id="items">
        <div class="row mb-2">
            <div class="col"><input type="text" class="form-control" name="item_name[]" placeholder="Наименование" required></div>
            <div class="col"><input type="number" class="form-control" name="item_quantity[]" placeholder="Кол-во" required></div>
            <div class="col"><input type="text" class="form-control" name="item_unit[]" placeholder="Ед. изм." required></div>
            <div class="col"><input type="text" class="form-control" name="item_requirements[]" placeholder="Требования"></div>
        </div>
    </div>
    <button type="button" class="btn btn-sm btn-secondary" onclick="addItem()">+ Добавить позицию</button>

    <h4 class="mt-3">Критерии оценки</h4>
    <div id="criteria">
        <div class="row mb-2">
            <div class="col"><input type="text" class="form-control" name="criterion_name[]" placeholder="Название" required></div>
            <div class="col"><input type="number" class="form-control" name="criterion_weight[]" placeholder="Вес %" required></div>
            <div class="col">
                <select class="form-select" name="criterion_type[]">
                    <option value="numeric_min">Числовой (минимизация)</option>
                    <option value="numeric_max">Числовой (максимизация)</option>
                    <option value="categorical">Категориальный</option>
                    <option value="manual">Ручной</option>
                </select>
            </div>
            <div class="col form-check">
                <input type="checkbox" class="form-check-input" name="criterion_mandatory[]">
                <label class="form-check-label">Обязательный</label>
            </div>
        </div>
    </div>
    <button type="button" class="btn btn-sm btn-secondary" onclick="addCriterion()">+ Добавить критерий</button>

    <h4 class="mt-3">Дедлайн первого раунда</h4>
    <input type="datetime-local" class="form-control" name="first_round_deadline" required>

    <h4 class="mt-3">Пригласить поставщиков (email через запятую)</h4>
    <textarea class="form-control" name="supplier_emails" rows="2" placeholder="email1@example.com, email2@example.com"></textarea>

    <button type="submit" class="btn btn-primary mt-3">Создать тендер</button>
</form>
<div id="result-msg" class="mt-3"></div>

<script>
    function addItem() {
        const div = document.createElement('div');
        div.className = 'row mb-2';
        div.innerHTML = `
            <div class="col"><input type="text" class="form-control" name="item_name[]" placeholder="Наименование" required></div>
            <div class="col"><input type="number" class="form-control" name="item_quantity[]" placeholder="Кол-во" required></div>
            <div class="col"><input type="text" class="form-control" name="item_unit[]" placeholder="Ед. изм." required></div>
            <div class="col"><input type="text" class="form-control" name="item_requirements[]" placeholder="Требования"></div>
        `;
        document.getElementById('items').appendChild(div);
    }
    function addCriterion() {
        const div = document.createElement('div');
        div.className = 'row mb-2';
        div.innerHTML = `
            <div class="col"><input type="text" class="form-control" name="criterion_name[]" placeholder="Название" required></div>
            <div class="col"><input type="number" class="form-control" name="criterion_weight[]" placeholder="Вес %" required></div>
            <div class="col">
                <select class="form-select" name="criterion_type[]">
                    <option value="numeric_min">Числовой (минимизация)</option>
                    <option value="numeric_max">Числовой (максимизация)</option>
                    <option value="categorical">Категориальный</option>
                    <option value="manual">Ручной</option>
                </select>
            </div>
            <div class="col form-check">
                <input type="checkbox" class="form-check-input" name="criterion_mandatory[]">
                <label class="form-check-label">Обязательный</label>
            </div>
        `;
        document.getElementById('criteria').appendChild(div);
    }

    document.getElementById('tenderForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const items = [];
        const itemNames = formData.getAll('item_name[]');
        const itemQtys = formData.getAll('item_quantity[]');
        const itemUnits = formData.getAll('item_unit[]');
        const itemReqs = formData.getAll('item_requirements[]');
        for (let i = 0; i < itemNames.length; i++) {
            items.push({
                name: itemNames[i],
                quantity: parseFloat(itemQtys[i]),
                unit: itemUnits[i],
                requirements: itemReqs[i] || null
            });
        }

        const criteria = [];
        const critNames = formData.getAll('criterion_name[]');
        const critWeights = formData.getAll('criterion_weight[]');
        const critTypes = formData.getAll('criterion_type[]');
        const critMandatory = formData.getAll('criterion_mandatory[]');
        for (let i = 0; i < critNames.length; i++) {
            criteria.push({
                name: critNames[i],
                weight: parseFloat(critWeights[i]),
                criterion_type: critTypes[i],
                is_mandatory: critMandatory.includes('on') // упрощённо, но в реальности нужно по индексу
            });
        }

        const deadline = new Date(formData.get('first_round_deadline')).toISOString();
        const emails = formData.get('supplier_emails').split(',').map(e => e.trim()).filter(e => e);

        const payload = {
            title: formData.get('title'),
            description: formData.get('description'),
            currency: formData.get('currency'),
            has_lots: formData.get('has_lots') === 'on',
            is_vendor_rank_visible: formData.get('is_vendor_rank_visible') === 'on',
            items: items,
            criteria: criteria,
            first_round_deadline: deadline,
            supplier_emails: emails
        };

        const token = localStorage.getItem('token');
        const response = await fetch('/api/tenders/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(payload)
        });
        const resultDiv = document.getElementById('result-msg');
        if (response.ok) {
            const tender = await response.json();
            resultDiv.innerHTML = `<div class="alert alert-success">Тендер создан! <a href="/customer/tender/${tender.id}">Перейти к тендеру</a></div>`;
        } else {
            const err = await response.json();
            resultDiv.innerHTML = `<div class="alert alert-danger">Ошибка: ${err.detail}</div>`;
        }
    });
</script>
{% endblock %}
